<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HM Sub1:40">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0e0e16">
<title>Plan HM Sub 1:40</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700;9..40,800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e16;--card:#1a1a28;--border:#2a2a3a;--text:#d8d8e4;--muted:#888;--red:#e04040;--green:#4eca6a;--blue:#4a9ee0;--yellow:#e0b040;--pink:#e05070;--purple:#b070e0;--orange:#e08040;--testy:#d0d050;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body{padding:calc(12px + var(--st)) 8px calc(66px + var(--sb))}

/* ── TABS ── */
.tabs{position:fixed;bottom:0;left:0;right:0;background:#101018;border-top:1px solid #1a1a26;display:flex;z-index:50;padding-bottom:var(--sb)}
.tab{flex:1;padding:8px 0 6px;text-align:center;font-size:9px;font-weight:700;color:#444;cursor:pointer;border:none;background:none;font-family:inherit;transition:color .15s}
.tab.on{color:var(--red)}
.tab i{font-size:20px;display:block;margin-bottom:1px;font-style:normal}

/* ── HEADER ── */
.hdr{text-align:center;margin-bottom:14px}
.hdr h1{font-size:20px;font-weight:800;letter-spacing:-.5px;line-height:1.1}
.hdr .ac{color:var(--red)}
.hdr .sub{font-size:11px;color:var(--muted);margin-top:3px}

/* ── MONTH NAV ── */
.mnav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:10px}
.mnav button{background:var(--card);border:1px solid var(--border);color:#bbb;width:36px;height:36px;border-radius:10px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.mnav button:disabled{opacity:.2}
.mnav .mt{font-size:17px;font-weight:700;min-width:160px;text-align:center}

/* ── LEGEND ── */
.leg{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.leg span{display:flex;align-items:center;gap:3px;font-size:9px;font-weight:600;color:var(--muted)}
.leg b{width:7px;height:7px;border-radius:3px;display:inline-block}

/* ── PHASES ── */
.pbar{display:flex;gap:3px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
.pch{font-size:9px;font-weight:700;padding:3px 7px;border-radius:5px;opacity:.35;transition:opacity .15s}
.pch.on{opacity:1}

/* ── SUMMARY ── */
.summ{display:flex;justify-content:center;gap:20px;margin-bottom:12px;padding:8px;background:#12121e;border-radius:10px;border:1px solid #1e1e2e}
.summ .v{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;text-align:center}
.summ .l{font-size:9px;color:#555;font-weight:600;text-transform:uppercase;letter-spacing:.5px;text-align:center}

/* ── GRID ── */
.dhdrs{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.dhdr{text-align:center;font-size:10px;font-weight:700;color:#555;padding:3px 0;font-family:'JetBrains Mono',monospace}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.c{border-radius:8px;min-height:72px;padding:4px;position:relative;cursor:pointer;border:1px solid transparent;overflow:hidden;transition:transform .1s}
.c:active{transform:scale(.95)}
.c.empty{background:transparent;cursor:default;min-height:0;pointer-events:none}
.c.off{background:#111118;cursor:default}
.dn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;color:#555;margin-bottom:1px}
.dn.today{color:#fff;background:var(--red);width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px}
.dt{font-size:9px;font-weight:700;line-height:1.2;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.dk{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:500;opacity:.7;margin-top:1px}
.dh{font-size:7px;opacity:.6;margin-top:1px;font-weight:600}
.wt{position:absolute;top:2px;right:3px;font-size:7px;font-weight:700;padding:1px 3px;border-radius:3px;background:rgba(255,255,255,.06);color:#555;font-family:'JetBrains Mono',monospace}

/* ── WEEK LIST ── */
.wcard{background:var(--card);border-radius:12px;margin-bottom:6px;border:1px solid var(--border);overflow:hidden}
.whdr{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.wnum{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.winfo{flex:1;min-width:0}
.wdates{font-weight:700;font-size:13px}
.wmeta{font-size:11px;color:var(--muted);margin-top:1px}
.wdots{display:flex;gap:3px;flex-shrink:0}
.wdots b{width:7px;height:7px;border-radius:2px;display:block}
.warr{color:#444;font-size:16px;flex-shrink:0;margin-left:4px;transition:transform .15s}
.warr.open{transform:rotate(180deg)}
.wbody{padding:0 10px 12px;display:none}
.wbody.open{display:block}
.wday{display:flex;gap:8px;padding:8px 4px;border-top:1px solid rgba(255,255,255,.04);align-items:flex-start;cursor:pointer;border-radius:6px}
.wday:active{background:rgba(255,255,255,.03)}
.wdd{width:48px;flex-shrink:0;text-align:center}
.wdd .n{font-size:10px;font-weight:700;color:#555;text-transform:uppercase}
.wdd .d{font-size:12px;color:#aaa;font-weight:600}
.wbar{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:18px}
.wdi{flex:1;min-width:0}
.wdi .t{font-size:12px;font-weight:700}
.wdi .det{font-size:11px;color:#666;margin-top:2px;line-height:1.3}
.wdi .bdg{font-size:9px;margin-top:2px;font-weight:600}
.dltag{font-size:10px;background:#1a2a1a;color:#6dca8d;padding:1px 7px;border-radius:8px;font-weight:600;margin-left:6px}

/* ── OVERLAY ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
.ocard{background:#161622;border-radius:20px 20px 0 0;padding:20px 18px calc(18px + var(--sb));width:100%;max-width:500px;max-height:85vh;overflow-y:auto;border-top:2px solid #2a2a3a;animation:su .2s ease-out}
@keyframes su{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.ocard .handle{width:36px;height:4px;background:#333;border-radius:2px;margin:0 auto 14px}
.ocard .ph{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.ocard .da{font-size:12px;color:var(--muted);margin-bottom:10px}
.ocard .ti{font-size:20px;font-weight:800;margin-bottom:6px;line-height:1.2}
.ocard .de{font-size:13px;color:#aaa;line-height:1.5;margin-bottom:10px}
.ocard .km{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;margin-bottom:4px}
.ocard .close{margin-top:16px;background:#2a2a3a;border:none;color:#ccc;padding:12px 0;width:100%;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

/* ── STRENGTH ── */
.ss{margin-top:14px;border-top:1px solid var(--border);padding-top:14px}
.ss .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ss .sn{font-size:13px;font-weight:700;color:var(--purple)}
.ss .sp{font-size:9px;color:#555;font-weight:600}
.ss .sl{font-size:10px;color:var(--yellow);font-weight:700;background:#2a2210;padding:3px 10px;border-radius:6px;margin-bottom:8px;display:inline-block}
.ex{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid #1a1a26}
.ex:last-child{border-bottom:none}
.ex .en{font-size:12px;font-weight:600;color:#d0d0e0}
.ex .eno{font-size:10px;color:#444;margin-top:1px}
.ex .es{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--purple);white-space:nowrap;flex-shrink:0;margin-left:10px}

/* ── ZONES VIEW ── */
.zcard{background:var(--card);border-radius:12px;padding:16px;margin-bottom:8px;border:1px solid var(--border)}
.zcard h3{font-size:14px;font-weight:700;margin-bottom:10px}
.zr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #1e1e2e}
.zr:last-child{border-bottom:none}
.zr .zn{font-size:13px;font-weight:600}
.zr .zp{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500}
.zr .zu{font-size:10px;color:#555}

.tcard{background:var(--card);border-radius:12px;padding:16px;margin-bottom:8px;border-left:3px solid var(--testy);border-right:1px solid var(--border);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.tcard .td{font-size:12px;color:var(--testy);font-weight:700}
.tcard .tn{font-size:15px;font-weight:800;margin:4px 0}
.tcard .to{font-size:12px;color:#aaa;line-height:1.5}

.section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:18px 0 8px 4px}

.hidden{display:none!important}
</style>
</head>
<body>

  const a=title.includes("Fuerza A"),b=title.includes("Fuerza B");
  if(!a&&!b)return null;
  const t=a?"A":"B",p=week<=2?"adapt":week<=19?"strength":"maintain";
  const r=STR[t][p];
  return{...r,tp:`Fuerza ${t}`,light:/ligera|muy ligera|suave|reducid/i.test(title)};

// ═══════════ HELPERS ═══════════
function dt(w,d){const r=new Date(START);r.setDate(r.getDate()+(w-1)*7+d);return r;}
function fmtD(d){return d.getDate()+" "+MES[d.getMonth()].slice(0,3).toLowerCase();}
function dayMap(){
  const m={};
  for(let w=0;w<24;w++)for(let d=0;d<7;d++){
    const date=dt(w+1,d);
    const k=date.getFullYear()+"-"+date.getMonth()+"-"+date.getDate();
    const[type,title,detail,km]=WK[w][d];
    m[k]={type,title,detail,km,week:w+1,date};
  }
  return m;
}
const DAYS=dayMap();
const today=new Date();

// ═══════════ STATE ═══════════
let curMonth=3,curYear=2026,curTab="cal",openWeek=null;

// ═══════════ RENDER CALENDAR ═══════════
function renderCal(){
  const v=document.getElementById("v-cal");
  const first=new Date(curYear,curMonth,1);
  let sd=first.getDay(); sd=sd===0?6:sd-1;
  const dim=new Date(curYear,curMonth+1,0).getDate();

  // Phase chips
  const activeP=new Set();
  for(let d=1;d<=dim;d++){const i=DAYS[curYear+"-"+curMonth+"-"+d];if(i)activeP.add(gp(i.week)?.n);}

  // Month km
  let mkm=0,msess=0;
  for(let d=1;d<=dim;d++){const i=DAYS[curYear+"-"+curMonth+"-"+d];if(i){mkm+=i.km;if(i.type!=="rest")msess++;}}

  let h=`<div class="leg">${Object.entries(TC).filter(([k])=>k!=="rest").map(([,v])=>`<span><b style="background:${v.ac}"></b>${v.lb}</span>`).join("")}</div>`;
  h+=`<div class="mnav"><button id="mprev" ${curYear===2026&&curMonth<=3?"disabled":""}>&lsaquo;</button><span class="mt">${MES[curMonth]} ${curYear}</span><button id="mnext" ${curYear===2026&&curMonth>=9?"disabled":""}>&rsaquo;</button></div>`;
  h+=`<div class="pbar">${PH.map(p=>`<span class="pch${activeP.has(p.n)?" on":""}" style="background:${p.c}30;color:${p.c}">${p.n}</span>`).join("")}</div>`;
  h+=`<div class="summ"><div><div class="v">${mkm}</div><div class="l">km este mes</div></div><div><div class="v">${msess}</div><div class="l">sesiones</div></div></div>`;
  h+=`<div class="dhdrs">${DN.map(d=>`<div class="dhdr">${d}</div>`).join("")}</div>`;
  h+=`<div class="grid">`;

  for(let i=0;i<sd;i++) h+=`<div class="c empty"></div>`;
  for(let d=1;d<=dim;d++){
    const info=DAYS[curYear+"-"+curMonth+"-"+d];
    const t=info?TC[info.type]||TC.rest:null;
    const isToday=today.getFullYear()===curYear&&today.getMonth()===curMonth&&today.getDate()===d;
    const ph=info?gp(info.week):null;
    const pos=(sd+d-1)%7;
    const showW=pos===0&&info;
    if(info){
      h+=`<div class="c" style="background:${t.bg};border-color:${t.bd}" data-key="${curYear}-${curMonth}-${d}">`;
      h+=`<div class="dn${isToday?" today":""}">${d}</div>`;
      if(showW) h+=`<span class="wt" style="color:${ph?.c||"#555"}">S${info.week}</span>`;
      h+=`<div class="dt" style="color:${t.ac}">${info.title}</div>`;
      if(info.km>0) h+=`<div class="dk">${info.km}km</div>`;
      if(info.type==="strength") h+=`<div class="dh" style="color:${t.ac}">ver rutina ↗</div>`;
      h+=`</div>`;
    } else {
      h+=`<div class="c off"><div class="dn">${d}</div></div>`;
    }
  }
  const rem=(sd+dim)%7; if(rem>0) for(let i=0;i<7-rem;i++) h+=`<div class="c empty"></div>`;
  h+=`</div>`;
  v.innerHTML=h;

  document.getElementById("mprev")?.addEventListener("click",()=>{if(curMonth===0){curMonth=11;curYear--;}else curMonth--;renderCal();});
  document.getElementById("mnext")?.addEventListener("click",()=>{if(curMonth===11){curMonth=0;curYear++;}else curMonth++;renderCal();});
  v.querySelectorAll(".c[data-key]").forEach(el=>el.addEventListener("click",()=>showDetail(el.dataset.key)));
}

// ═══════════ RENDER WEEKS ═══════════
function renderWeeks(){
  const v=document.getElementById("v-weeks");
  let h="";
  // Find current week
  const diff=Math.floor((today-START)/(7*864e5));
  const curW=Math.max(1,Math.min(24,diff+1));

  for(let wi=0;wi<24;wi++){
    const w=wi+1,ph=gp(w),d0=dt(w,0),d6=dt(w,6);
    const isOpen=openWeek===w;
    h+=`<div class="wcard" id="wk${w}">`;
    h+=`<div class="whdr" data-w="${w}">`;
    h+=`<div class="wnum" style="background:${ph.c}">${w}</div>`;
    h+=`<div class="winfo"><div class="wdates">${fmtD(d0)} — ${fmtD(d6)}${DL.has(w)?'<span class="dltag">DESCARGA</span>':""}</div>`;
    h+=`<div class="wmeta">${ph.n} · ${KM[wi]} km</div></div>`;
    h+=`<div class="wdots">${WK[wi].map(([t])=>`<b style="background:${(TC[t]||TC.rest).ac};opacity:${t==="rest"?.3:.9}"></b>`).join("")}</div>`;
    h+=`<span class="warr${isOpen?" open":""}">▼</span></div>`;
    h+=`<div class="wbody${isOpen?" open":""}">`;
    for(let di=0;di<7;di++){
      const date=dt(w,di),wd=date.getDay(),dnI=(wd===0?6:wd-1);
      const[type,title,detail,km]=WK[wi][di];
      const tc=TC[type]||TC.rest;
      const key=date.getFullYear()+"-"+date.getMonth()+"-"+date.getDate();
      h+=`<div class="wday" data-key="${key}">`;
      h+=`<div class="wdd"><div class="n">${DN[dnI]}</div><div class="d">${date.getDate()}/${date.getMonth()+1}</div></div>`;
      h+=`<div class="wbar" style="background:${tc.ac};opacity:${type==="rest"?.3:.8}"></div>`;
      h+=`<div class="wdi"><div class="t" style="color:${tc.ac}">${title}</div>`;
      if(detail) h+=`<div class="det">${detail}</div>`;
      if(type==="strength") h+=`<div class="bdg" style="color:${tc.ac}">ver rutina ↗</div>`;
      if(km>0) h+=`<div class="bdg" style="color:#555">${km} km</div>`;
      h+=`</div></div>`;
    }
    h+=`</div></div>`;
  }
  v.innerHTML=h;

  v.querySelectorAll(".whdr").forEach(el=>el.addEventListener("click",()=>{
    const w=+el.dataset.w;
    openWeek=openWeek===w?null:w;
    renderWeeks();
  }));
  v.querySelectorAll(".wday").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();showDetail(el.dataset.key);}));

  // Auto-open current week on first render
  if(openWeek===null&&curW>=1&&curW<=24){openWeek=curW;renderWeeks();}
}

// ═══════════ DETAIL OVERLAY ═══════════
function showDetail(key){
  const info=DAYS[key];
  if(!info)return;
  const ph=gp(info.week);
  const tc=TC[info.type]||TC.rest;
  const wd=info.date.getDay();

  let h=`<div class="ph" style="color:${ph.c}">Semana ${info.week} · ${ph.n}${DL.has(info.week)?" · DESCARGA":""}</div>`;
  h+=`<div class="da">${DNF[wd].charAt(0).toUpperCase()+DNF[wd].slice(1)} ${info.date.getDate()} de ${MES[info.date.getMonth()].toLowerCase()}</div>`;
  h+=`<div class="ti" style="color:${tc.ac}">${info.title}</div>`;
  if(info.detail) h+=`<div class="de">${info.detail}</div>`;
  if(info.km>0) h+=`<div class="km" style="color:${tc.ac}">📏 ${info.km} km · Total semana: ~${KM[info.week-1]} km</div>`;

  if(info.type==="strength"){
    const r=gstr(info.title,info.week);
    if(r){
      h+=`<div class="ss"><div class="sh"><span class="sn">🟣 ${r.tp}</span><span class="sp">${r.ph}</span></div>`;
      if(r.light) h+=`<div class="sl">⚡ Sesión ligera: reduce a 2 series por ejercicio</div>`;
      h+=r.ex.map(([n,s,note])=>`<div class="ex"><div><div class="en">${n}</div>${note?`<div class="eno">${note}</div>`:""}</div><div class="es">${s}</div></div>`).join("");
      h+=`</div>`;
    }
  }

  document.getElementById("ocontent").innerHTML=h;
  document.getElementById("overlay").classList.add("open");
}

function closeOverlay(){document.getElementById("overlay").classList.remove("open");}
document.getElementById("oclose").addEventListener("click",closeOverlay);
document.getElementById("overlay").addEventListener("click",e=>{if(e.target===e.currentTarget)closeOverlay();});

// Service worker for offline (inline)
if("serviceWorker"in navigator){
  const sw=new Blob([`self.addEventListener("install",e=>self.skipWaiting());self.addEventListener("activate",e=>self.clients.claim());self.addEventListener("fetch",e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res.ok){const c=res.clone();caches.open("hm-v2").then(cache=>cache.put(e.request,c));}return res;}).catch(()=>new Response("Offline",{status:503})));});`],{type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(sw)).catch(()=>{});
}
</script>
