<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plan Running</title>

<style>
/* === pega aquí tu CSS (tal cual desde .cal-root) === */
</style>
</head>

<body>
<div id="app" class="cal-root"></div>

<script>
/* =========================
   1. CONSTANTES (igual que React)
========================= */

const TYPES = { /* pega aquí TYPES */ };

const PHASES = [ /* pega aquí PHASES */ ];

const RAW = [ /* pega aquí RAW completo */ ];

const KM = [ /* igual */ ];
const DELOAD = new Set([3,7,14,19]);

const MONTHS_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

const START = new Date(2026, 3, 14);

/* =========================
   2. LÓGICA (igual que React)
========================= */

function getPhase(w) {
  return PHASES.find(p => p.w.includes(w));
}

function getAllDays() {
  const map = {};
  for (let wi = 0; wi < RAW.length; wi++) {
    for (let di = 0; di < 7; di++) {
      const dt = new Date(START);
      dt.setDate(dt.getDate() + wi * 7 + di);
      const key = `${dt.getFullYear()}-${dt.getMonth()}-${dt.getDate()}`;
      const [type, title, detail, km] = RAW[wi][di];
      map[key] = { type, title, detail, km, week: wi + 1 };
    }
  }
  return map;
}

function getMonthGrid(year, month) {
  const first = new Date(year, month, 1);
  let startDay = first.getDay();
  startDay = startDay === 0 ? 6 : startDay - 1;

  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const rows = [];
  let row = Array(7).fill(null);
  let day = 1;

  for (let i = startDay; day <= daysInMonth; i++) {
    if (i > 0 && i % 7 === 0) {
      rows.push(row);
      row = Array(7).fill(null);
    }
    row[i % 7] = day++;
  }

  rows.push(row);
  return rows;
}

/* =========================
   3. ESTADO SIMPLE
========================= */

let state = {
  month: 3,
  year: 2026,
  selected: null,
  allDays: getAllDays()
};

/* =========================
   4. RENDER
========================= */

function render() {
  const root = document.getElementById("app");
  const grid = getMonthGrid(state.year, state.month);
  const today = new Date();

  let html = `
    <div class="cal-hdr">
      <h1>Plan Media Maratón <span class="accent">Sub 1:40</span></h1>
    </div>

    <div class="month-nav">
      <button onclick="prev()">‹</button>
      <span class="month-title">${MONTHS_ES[state.month]} ${state.year}</span>
      <button onclick="next()">›</button>
    </div>

    <div class="month-grid">
  `;

  grid.forEach((row, ri) => {
    row.forEach((dayNum, ci) => {
      if (!dayNum) {
        html += `<div class="day-cell empty"></div>`;
        return;
      }

      const key = `${state.year}-${state.month}-${dayNum}`;
      const info = state.allDays[key];

      if (!info) {
        html += `<div class="day-cell outside"></div>`;
        return;
      }

      const t = TYPES[info.type];
      const isToday =
        today.getDate() === dayNum &&
        today.getMonth() === state.month &&
        today.getFullYear() === state.year;

      html += `
        <div class="day-cell"
          style="background:${t.bg};border-color:${t.border}"
          onclick="selectDay(${dayNum})">

          <div class="day-num ${isToday ? "today" : ""}">${dayNum}</div>

          <div class="day-title" style="color:${t.accent}">
            ${info.title}
          </div>

          ${info.km ? `<div class="day-km">${info.km}km</div>` : ""}
        </div>
      `;
    });
  });

  html += `</div>`;

  /* modal */
  if (state.selected) {
    const s = state.selected;
    html += `
      <div class="detail-overlay" onclick="closeModal()">
        <div class="detail-card" onclick="event.stopPropagation()">
          <div class="dc-title">${s.title}</div>
          <div class="dc-detail">${s.detail || ""}</div>
          <div class="dc-km">${s.km} km</div>
          <button class="dc-close" onclick="closeModal()">Cerrar</button>
        </div>
      </div>
    `;
  }

  root.innerHTML = html;
}

/* =========================
   5. ACCIONES
========================= */

function prev() {
  if (state.month === 0) {
    state.month = 11;
    state.year--;
  } else state.month--;
  render();
}

function next() {
  if (state.month === 11) {
    state.month = 0;
    state.year++;
  } else state.month++;
  render();
}

function selectDay(day) {
  const key = `${state.year}-${state.month}-${day}`;
  state.selected = state.allDays[key];
  render();
}

function closeModal() {
  state.selected = null;
  render();
}

/* init */
render();
</script>
</body>
</html>
