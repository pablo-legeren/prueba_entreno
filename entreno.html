  --bg: #0e0e16;

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
body { padding: calc(12px + var(--safe-top)) 8px calc(70px + var(--safe-bot)); }

.tabs {
  position: fixed; bottom: 0; left: 0; right: 0;

  display: flex; z-index: 50;
  padding-bottom: var(--safe-bot);
}
.tab {
  flex: 1; padding: 10px 0 8px; text-align: center;

  cursor: pointer; border: none; background: none;
  transition: color .15s;
}
.tab.active { color: var(--red); }
.tab-icon { font-size: 20px; display: block; margin-bottom: 2px; }

/* HEADER */
.hdr { text-align: center; margin-bottom: 16px; }
.hdr h1 { font-size: 20px; font-weight: 800; letter-spacing: -.5px; line-height: 1.1; }
.hdr .accent { color: var(--red); }
.hdr .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

.month-nav { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 12px; }
.month-nav button { background: var(--card); border: 1px solid var(--border); color: #bbb; width: 36px; height: 36px; border-radius: 10px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.month-nav button:disabled { opacity: .2; }
.month-title { font-size: 17px; font-weight: 700; min-width: 160px; text-align: center; }

.legend { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; margin-bottom: 10px; }
.legend-item { display: flex; align-items: center; gap: 3px; font-size: 9px; font-weight: 600; color: var(--muted); }
.legend-dot { width: 7px; height: 7px; border-radius: 3px; }

/* PHASES */
.phase-bar { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; margin-bottom: 10px; }
.phase-chip { font-size: 9px; font-weight: 700; padding: 3px 7px; border-radius: 5px; opacity: .4; transition: opacity .15s; }
.phase-chip.on { opacity: 1; }

.summary .val { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; text-align: center; }
.summary .lbl { font-size: 9px; color: #555; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; text-align: center; }

.cell { border-radius: 8px; min-height: 72px; padding: 4px 4px; position: relative; cursor: pointer; border: 1px solid transparent; overflow: hidden; transition: transform .1s; }
.cell:active { transform: scale(.96); }
.cell.empty { background: transparent; cursor: default; min-height: 0; }
.cell.off { background: #111118; }
.day-n { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; color: #666; margin-bottom: 1px; }
